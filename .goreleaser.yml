version: 2

builds:
  - main: ./cmd/crm
    binary: crm
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/jdanielnd/crm-cli/internal/cli.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

checksum:
  name_template: 'checksums.txt'

brews:
  - repository:
      owner: jdanielnd
      name: homebrew-tap
    name: crm
    homepage: "https://github.com/jdanielnd/crm-cli"
    description: "Local-first personal CRM for the terminal"
    license: "MIT"
    install: |
      bin.install "crm"
    test: |
      system "#{bin}/crm", "--version"
